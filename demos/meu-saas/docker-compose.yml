version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: meusaas-postgres
    environment:
      POSTGRES_DB: meusaas_db
      POSTGRES_USER: meusaas_user
      POSTGRES_PASSWORD: meusaas_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meusaas_user -d meusaas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meusaas-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
