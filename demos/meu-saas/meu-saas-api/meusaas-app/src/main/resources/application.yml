spring:
  application:
    name: meusaas

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5433/meusaas_db
    username: meusaas_user
    password: meusaas_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6381

server:
  port: 8444

app:
  jwt:
    secret: meusaas-jwt-secret-key-that-should-be-changed-in-production-environment-and-be-at-least-256-bits
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 30
  cors:
    allowed-origins: http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: MeuSaaS
    description: Sistema de gestão empresarial
    version: 0.0.1-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
